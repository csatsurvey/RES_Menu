<!DOCTYPE html>
<html lang="mn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#E87B2F" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ResMenu" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <title>Ресторан Систем</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        // 1. Эхлэж бүх хуучин SW устга
        navigator.serviceWorker.getRegistrations().then(regs => {
          regs.forEach(r => r.unregister());
        });
        // 2. Cache бүгдийг устга
        if (window.caches) {
          caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
        }
        // 3. Шинэ SW бүртгэ
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js?v=4', { scope: '/' })
            .then(reg => {
              reg.addEventListener('updatefound', () => {
                const sw = reg.installing;
                if (!sw) return;
                sw.addEventListener('statechange', () => {
                  if (sw.state === 'installed') {
                    sw.postMessage({ type: 'SKIP_WAITING' });
                  }
                });
              });
              navigator.serviceWorker.addEventListener('controllerchange', () => {
                window.location.reload();
              });
            });
        });
      }
    </script>
  </body>
</html>
