<!DOCTYPE html>
<html lang="mn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#E87B2F" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ResMenu" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <title>Ресторан Систем</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(reg => {
              // Шинэ хувилбар олдвол автоматаар шинэчилнэ
              reg.addEventListener('updatefound', () => {
                const newSW = reg.installing;
                if (!newSW) return;
                newSW.addEventListener('statechange', () => {
                  if (newSW.state === 'installed') {
                    // Шинэ SW бэлэн болсон → тэр дороо идэвхижүүлж reload
                    newSW.postMessage({ type: 'SKIP_WAITING' });
                  }
                });
              });

              // SW controller солигдвол хуудас автоматаар шинэчлэгдэнэ
              navigator.serviceWorker.addEventListener('controllerchange', () => {
                window.location.reload();
              });
            })
            .catch(err => console.warn('[SW] Register failed:', err));
        });
      }
    </script>
  </body>
</html>
